<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 460" width="1100" height="460" role="img" aria-label="GenerateVR at a glance: customers author scenarios in the browser, a headless server generates a tailored VR scene with an LLM (optionally grounded in the customer's own corpus), and the result ships to headset, desktop, and mobile.">

  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFDB6E"/>
      <stop offset="100%" stop-color="#FFBC5E"/>
    </linearGradient>

    <radialGradient id="nodeBg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFBC5E" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#FFBC5E" stop-opacity="0.025"/>
      <stop offset="100%" stop-color="#FFBC5E" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .sans  { font-family: "Space Grotesk", "Inter", system-ui, -apple-system, sans-serif; }
      .body  { font-family: "Poppins", "Inter", system-ui, -apple-system, sans-serif; }
      .eyebrow { font-size: 12px; fill: #FFC964; letter-spacing: 3.2px; font-weight: 600; }
      .label   { font-size: 32px; fill: #f3f3f3; font-weight: 600; letter-spacing: -0.4px; }
      .sub     { font-size: 14px; fill: #9a9a9c; letter-spacing: 0.3px; }
      .pill    { font-size: 11px; fill: #FFC964; letter-spacing: 1.4px; font-weight: 600; }
    </style>
  </defs>

  <!-- ===== Canvas ===== -->
  <rect width="1100" height="460" fill="#0e0e10"/>

  <!-- ===== Centre spine — a faint horizontal line that the three nodes sit on ===== -->
  <line x1="120" y1="200" x2="980" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- ============================================================
       NODE 01 · AUTHOR
       Centre: (220, 200), radius 64
       ============================================================ -->
  <g>
    <text x="220" y="112" class="sans eyebrow" text-anchor="middle">01</text>

    <!-- Glow halo -->
    <circle cx="220" cy="200" r="80" fill="url(#nodeBg)"/>
    <!-- Ring -->
    <circle cx="220" cy="200" r="64" fill="none" stroke="#FFBC5E" stroke-opacity="0.55" stroke-width="1.4"/>
    <circle cx="220" cy="200" r="64" fill="#0e0e10"/>

    <!-- Glyph: browser window -->
    <g transform="translate(180 168)" stroke="url(#goldGrad)" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="0" width="80" height="62" rx="5"/>
      <line x1="0" y1="14" x2="80" y2="14"/>
      <circle cx="8" cy="7" r="1.6" fill="url(#goldGrad)" stroke="none"/>
      <circle cx="14" cy="7" r="1.6" fill="url(#goldGrad)" stroke="none"/>
      <circle cx="20" cy="7" r="1.6" fill="url(#goldGrad)" stroke="none"/>
      <line x1="10" y1="26" x2="44" y2="26" stroke-opacity="0.7"/>
      <line x1="10" y1="36" x2="58" y2="36" stroke-opacity="0.5"/>
      <line x1="10" y1="46" x2="36" y2="46" stroke-opacity="0.5"/>
      <rect x="52" y="42" width="20" height="12" rx="2" stroke-opacity="0.85"/>
    </g>

    <text x="220" y="318" class="sans label" text-anchor="middle">Author</text>
    <text x="220" y="346" class="body sub" text-anchor="middle">in the customer's own browser</text>
  </g>

  <!-- ============================================================
       FLOW · 01 → 02
       ============================================================ -->
  <g filter="url(#softGlow)">
    <line x1="295" y1="200" x2="465" y2="200" stroke="url(#goldGrad)" stroke-width="1.4"/>
    <path d="M 460 192 L 472 200 L 460 208" fill="none" stroke="url(#goldGrad)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ============================================================
       NODE 02 · GENERATE  (the centrepiece — slightly stronger ring)
       Centre: (550, 200), radius 64
       ============================================================ -->
  <g>
    <text x="550" y="112" class="sans eyebrow" text-anchor="middle">02</text>

    <circle cx="550" cy="200" r="86" fill="url(#nodeBg)"/>
    <circle cx="550" cy="200" r="64" fill="none" stroke="url(#goldGrad)" stroke-width="1.8" filter="url(#softGlow)"/>
    <circle cx="550" cy="200" r="64" fill="#0e0e10"/>

    <!-- Glyph: small LLM neural graph (3 input nodes ↔ 3 output nodes) -->
    <g transform="translate(508 170)" stroke="url(#goldGrad)" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="6" cy="10" r="3.6"/>
      <circle cx="6" cy="30" r="3.6"/>
      <circle cx="6" cy="50" r="3.6"/>
      <circle cx="78" cy="10" r="3.6" fill="url(#goldGrad)"/>
      <circle cx="78" cy="30" r="3.6" fill="url(#goldGrad)"/>
      <circle cx="78" cy="50" r="3.6" fill="url(#goldGrad)"/>
      <line x1="10" y1="10" x2="74" y2="10" stroke-opacity="0.55"/>
      <line x1="10" y1="10" x2="74" y2="30" stroke-opacity="0.55"/>
      <line x1="10" y1="30" x2="74" y2="10" stroke-opacity="0.55"/>
      <line x1="10" y1="30" x2="74" y2="30" stroke-opacity="0.55"/>
      <line x1="10" y1="30" x2="74" y2="50" stroke-opacity="0.55"/>
      <line x1="10" y1="50" x2="74" y2="30" stroke-opacity="0.55"/>
      <line x1="10" y1="50" x2="74" y2="50" stroke-opacity="0.55"/>
    </g>

    <text x="550" y="318" class="sans label" text-anchor="middle">Generate</text>
    <text x="550" y="346" class="body sub" text-anchor="middle">headless server · LLM-authored scenes</text>

    <!-- Optional RAG indicator pill — sits just below, signals the differentiator.
         Width is generous so the dashed border fully contains the text. -->
    <g transform="translate(550 372)">
      <rect x="-140" y="0" width="280" height="26" rx="13" fill="#0e0e10" stroke="#FFBC5E" stroke-opacity="0.6" stroke-dasharray="3 3"/>
      <text x="0" y="17" class="sans pill" text-anchor="middle">+ OPTIONAL CUSTOMER RAG CORPUS</text>
    </g>
  </g>

  <!-- ============================================================
       FLOW · 02 → 03
       ============================================================ -->
  <g filter="url(#softGlow)">
    <line x1="625" y1="200" x2="795" y2="200" stroke="url(#goldGrad)" stroke-width="1.4"/>
    <path d="M 790 192 L 802 200 L 790 208" fill="none" stroke="url(#goldGrad)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ============================================================
       NODE 03 · SHIP
       Centre: (880, 200), radius 64
       ============================================================ -->
  <g>
    <text x="880" y="112" class="sans eyebrow" text-anchor="middle">03</text>

    <circle cx="880" cy="200" r="80" fill="url(#nodeBg)"/>
    <circle cx="880" cy="200" r="64" fill="none" stroke="#FFBC5E" stroke-opacity="0.55" stroke-width="1.4"/>
    <circle cx="880" cy="200" r="64" fill="#0e0e10"/>

    <!-- Glyph: rocket — single clean shape, gold gradient.
         viewBox-local coords: rocket points up, fits ~88×88 area. -->
    <g transform="translate(836 156)" stroke="url(#goldGrad)" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Body (oblong) -->
      <path d="M44 6 C 60 22 60 50 44 78 C 28 50 28 22 44 6 Z"/>
      <!-- Window porthole -->
      <circle cx="44" cy="32" r="6"/>
      <circle cx="44" cy="32" r="2.4" fill="url(#goldGrad)" stroke="none"/>
      <!-- Left fin -->
      <path d="M32 56 L20 70 L20 78 L34 70 Z"/>
      <!-- Right fin -->
      <path d="M56 56 L68 70 L68 78 L54 70 Z"/>
      <!-- Flame plume -->
      <path d="M40 78 Q44 90 48 78" stroke-opacity="0.85"/>
      <path d="M42 80 Q44 86 46 80" stroke-opacity="0.55"/>
    </g>

    <text x="880" y="318" class="sans label" text-anchor="middle">Ship</text>
    <text x="880" y="346" class="body sub" text-anchor="middle">headset · desktop · mobile</text>

    <!-- Auto-deploy pill — matches the RAG pill on the Generate node,
         surfaces the second key differentiator. -->
    <g transform="translate(880 372)">
      <rect x="-140" y="0" width="280" height="26" rx="13" fill="#0e0e10" stroke="#FFBC5E" stroke-opacity="0.6" stroke-dasharray="3 3"/>
      <text x="0" y="17" class="sans pill" text-anchor="middle">+ AUTO-PUSHED TO FLEET HEADSETS</text>
    </g>
  </g>

</svg>
