<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" width="1200" height="780" role="img" aria-label="GenerateVR architecture: enterprise authoring to procedural VR output, with an optional RAG branch grounding the LLM in the customer's corpus.">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#111"/>
    </marker>
    <style>
      .sans { font-family: "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif; }
      .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
      .h1   { font-size: 28px; font-weight: 700; fill: #111; letter-spacing: -0.4px; }
      .h2   { font-size: 13px; fill: #666; letter-spacing: 0.2px; }
      .eye  { font-size: 10px; fill: #888; letter-spacing: 2px; font-weight: 700; }
      .num  { font-size: 11px; fill: #888; letter-spacing: 1.5px; font-weight: 600; }
      .title{ font-size: 16px; font-weight: 700; fill: #111; letter-spacing: -0.1px; }
      .body { font-size: 12.5px; fill: #333; }
      .muted{ font-size: 12px; fill: #888; }
      .tag  { font-size: 11px; fill: #111; letter-spacing: 0.5px; }
      .edge { font-size: 11.5px; fill: #111; letter-spacing: 0.3px; }
      .footnote { font-size: 11px; fill: #666; font-style: italic; }
    </style>
  </defs>

  <rect width="1200" height="780" fill="#ffffff"/>

  <!-- ====================== HEADER ====================== -->
  <text x="72" y="60" class="sans h1">GenerateVR — architecture</text>
  <text x="72" y="82" class="sans h2">Enterprise authoring input, procedural VR output, optionally grounded in the customer's own corpus.</text>
  <line x1="72" y1="104" x2="1128" y2="104" stroke="#111" stroke-width="1"/>

  <!-- Swim-lane eyebrows -->
  <text x="72"  y="130" class="sans eye">INPUT</text>
  <text x="460" y="130" class="sans eye">GENERATION · HEADLESS</text>
  <text x="996" y="130" class="sans eye">OUTPUT</text>

  <!-- ====================== STAGE 1: Enterprise Web ====================== -->
  <!-- Box: x=72..412, y=152..452 (w=340, h=300) -->
  <g>
    <rect x="72" y="152" width="340" height="300" rx="4" fill="none" stroke="#111" stroke-width="1.5"/>
    <text x="92" y="180" class="sans num">01 · AUTHORING</text>
    <text x="92" y="206" class="sans title">Enterprise web app</text>
    <text x="92" y="226" class="sans muted">Customer-facing authoring surface</text>
    <line x1="92" y1="244" x2="392" y2="244" stroke="#e5e5e5" stroke-width="1"/>

    <text x="92"  y="272" class="sans title" font-size="13">Vue.js controller</text>
    <text x="92"  y="290" class="sans body">Scenario and package wiring</text>

    <text x="92"  y="322" class="sans title" font-size="13">Live FBX 3D preview</text>
    <text x="92"  y="340" class="sans body">Inspect Unity packages in-browser</text>

    <text x="92"  y="372" class="sans title" font-size="13">Scenario JSON builder</text>
    <text x="92"  y="390" class="sans body">Structured training spec, not freeform text</text>

    <text x="92"  y="432" class="sans footnote">Customer assembles scenarios &amp; uploads source materials.</text>
  </g>

  <!-- Flow 1: Stage 1 -> Stage 2, labelled "JSON" -->
  <g>
    <line x1="412" y1="302" x2="476" y2="302" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="418" y="282" width="54" height="18" fill="#fff" stroke="#111" stroke-width="1"/>
    <text x="445" y="295" class="mono tag" text-anchor="middle">JSON</text>
  </g>

  <!-- ====================== STAGE 2: Headless Generation ====================== -->
  <!-- Outer wrapper: x=488..920, y=152..452 (w=432, h=300) -->
  <g>
    <rect x="488" y="152" width="432" height="300" rx="4" fill="none" stroke="#111" stroke-width="1.5"/>
    <text x="508" y="180" class="sans num">02 · PIPELINE</text>
    <text x="508" y="206" class="sans title">Headless generation server</text>
    <text x="508" y="226" class="sans muted">No Unity editor in the loop</text>
    <line x1="508" y1="244" x2="900" y2="244" stroke="#e5e5e5" stroke-width="1"/>

    <!-- Step A: Ingest (y 260-310) -->
    <g>
      <rect x="508" y="260" width="392" height="50" rx="3" fill="#fafafa" stroke="#111" stroke-width="1"/>
      <text x="524" y="282" class="sans num" fill="#111">A</text>
      <text x="548" y="282" class="sans title" font-size="13">Ingest</text>
      <text x="548" y="300" class="sans body">Parse JSON · resolve package &amp; asset refs</text>
    </g>
    <line x1="704" y1="310" x2="704" y2="326" stroke="#111" stroke-width="1.2" marker-end="url(#arr)"/>

    <!-- Step B: LLM author (y 326-376) -->
    <g>
      <rect x="508" y="326" width="392" height="50" rx="3" fill="#fafafa" stroke="#111" stroke-width="1"/>
      <text x="524" y="348" class="sans num" fill="#111">B</text>
      <text x="548" y="348" class="sans title" font-size="13">LLM scenario author</text>
      <text x="548" y="366" class="sans body">Scene beats · dialogue · interactable wiring · structured-output prompting</text>
    </g>
    <line x1="704" y1="376" x2="704" y2="392" stroke="#111" stroke-width="1.2" marker-end="url(#arr)"/>

    <!-- Step C: Procedural builder (y 392-442) -->
    <g>
      <rect x="508" y="392" width="392" height="50" rx="3" fill="#fafafa" stroke="#111" stroke-width="1"/>
      <text x="524" y="414" class="sans num" fill="#111">C</text>
      <text x="548" y="414" class="sans title" font-size="13">Procedural scene builder</text>
      <text x="548" y="432" class="sans body">Geometry · interactables · scenario beats assembled</text>
    </g>
  </g>

  <!-- Flow 2: Stage 2 -> Stage 3, labelled "SCENE" -->
  <g>
    <line x1="920" y1="302" x2="984" y2="302" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="926" y="282" width="54" height="18" fill="#fff" stroke="#111" stroke-width="1"/>
    <text x="953" y="295" class="mono tag" text-anchor="middle">SCENE</text>
  </g>

  <!-- ====================== STAGE 3: Output ====================== -->
  <g>
    <rect x="996" y="152" width="184" height="300" rx="4" fill="none" stroke="#111" stroke-width="1.5"/>
    <text x="1016" y="180" class="sans num">03 · DEPLOY</text>
    <text x="1016" y="206" class="sans title">Tailored VR scene</text>
    <line x1="1016" y1="244" x2="1160" y2="244" stroke="#e5e5e5" stroke-width="1"/>

    <text x="1016" y="272" class="sans num" fill="#111">TARGETS</text>
    <text x="1016" y="296" class="sans body">Headset</text>
    <text x="1016" y="316" class="sans body">Desktop</text>
    <text x="1016" y="336" class="sans body">Mobile</text>

    <line x1="1016" y1="360" x2="1160" y2="360" stroke="#e5e5e5" stroke-width="1"/>
    <text x="1016" y="384" class="sans muted">Shipped via</text>
    <text x="1016" y="402" class="sans body">SkillsVR Content Creation Kit</text>
  </g>

  <!-- ====================== RAG BRANCH ====================== -->
  <!-- Placed below Stage 1 (left column) so its connector travels right and up, entering Stage 2 at step B's left edge. No crossings. -->
  <g>
    <rect x="72" y="504" width="340" height="172" rx="4" fill="none" stroke="#111" stroke-width="1.2" stroke-dasharray="4 4"/>
    <text x="92" y="532" class="sans num">OPTIONAL · GROUNDING</text>
    <text x="92" y="558" class="sans title">Customer RAG corpus</text>
    <text x="92" y="578" class="sans muted">SOPs · compliance docs · internal playbooks</text>
    <line x1="92" y1="596" x2="392" y2="596" stroke="#e5e5e5" stroke-width="1"/>
    <text x="92" y="620" class="sans body">Chunks · embeddings · retrieval at</text>
    <text x="92" y="638" class="sans body">generation time.</text>
    <text x="92" y="662" class="sans footnote">Grounds the LLM in the customer's own material.</text>
  </g>

  <!-- RAG connector: right edge of RAG box (x=412, y=590) -> up to step B left edge (x=488, y=351). Right-angle path. -->
  <!-- Path: start at (412, 590), go right to (460, 590), then up to (460, 351), then right to (488, 351) with arrow. -->
  <g>
    <path d="M 412 590 L 460 590 L 460 351 L 486 351" fill="none" stroke="#111" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arr)"/>
    <!-- Edge label alongside vertical segment -->
    <rect x="432" y="460" width="162" height="20" fill="#fff"/>
    <text x="438" y="474" class="sans edge">grounds LLM (optional)</text>
  </g>

  <!-- ====================== FOOTER / SCOPE ====================== -->
  <line x1="72" y1="712" x2="1128" y2="712" stroke="#e5e5e5" stroke-width="1"/>
  <text x="72" y="738" class="sans num" fill="#111">MY SCOPE</text>
  <text x="250" y="738" class="sans body">Ingest pipeline · headless generation server · LLM scenario authoring · optional RAG path.</text>
</svg>
